
{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MoxiEncomendaDeu{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f9f9f9;
            font-family: 'Segoe UI', sans-serif;
        }
        .top-banner {
            background-image: url("{% static 'img/banner_moxi.png' %}");
            background-size: cover;
            background-position: center;
            background-color: #003366;
            height: 65px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 2px 2px 4px #000000;
            font-size: 26px;
            font-weight: bold;
            padding: 0 20px;
        }

        .top-banner h1 {
            font-size: 3 rem;
            font-weight: bold;
        }

        .centralizado {
            text-align: center;
            margin-top: 8px;
        }

        .btn-custom {
            margin: 10px;
            width: 200px;
        }

        .menu-toggle {
            font-size: 30px;
            cursor: pointer;
            padding: 10px 20px;
            color: white;
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 1000;
        }

        .side-menu {
            position: absolute;
            top: 80px;
            left: 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
        }
        a {
            text-decoration: none;
            color: #003366;
            font-weight: bold;
            margin: 0 20px;
            transition: color 0.2s;
        }
        
        a:hover {
            text-decoration: underline;
            color: #0055aa;
        }
        
    </style>
</head>

<body>
    <div class="top-banner">
        <h1>🚚 Bem-vindo à MoxiEncomendaDeu</h1>
    </div>

    <!-- Bloco para conteúdo da página filha -->
    <div class="container centralizado">
        {% block content %}
        {% endblock %}
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("side-menu");
            menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
        }
    </script>
</body>
</html>
